<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FFGFT T⁴ Torus — θ₄ als Farbe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #ccc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { font-size: 16px; font-weight: 400; color: #888; margin-bottom: 16px; letter-spacing: 0.05em; }
canvas { display: block; border: 0.5px solid #333; border-radius: 8px; }
.ctrl { display: flex; align-items: center; gap: 12px; margin: 6px 0; width: 640px; }
.ctrl label { font-size: 13px; color: #888; min-width: 120px; }
.ctrl input { flex: 1; accent-color: #378ADD; }
.ctrl span { font-size: 13px; font-weight: 500; color: #ccc; min-width: 32px; }
.info { display: flex; gap: 10px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
.badge { font-size: 12px; padding: 4px 12px; border-radius: 6px; background: #1e1e1e; color: #888; border: 0.5px solid #333; }
.badge b { color: #ddd; font-weight: 500; }
.legend { font-size: 12px; color: #666; margin: 4px 0 12px; text-align: center; }
.leg-bar { width: 200px; height: 8px; border-radius: 4px; background: linear-gradient(to right, hsl(240,80%,55%), hsl(120,80%,45%), hsl(60,90%,50%), hsl(0,80%,55%), hsl(300,70%,55%), hsl(240,80%,55%)); display: inline-block; vertical-align: middle; margin: 0 8px; }
</style>
</head>
<body>
<h1>FFGFT — T⁴ Torus · Fundamental Fractal Geometric Field Theory</h1>
<canvas id="cv" width="640" height="340"></canvas>

<div class="legend">
  <span class="leg-bar"></span> θ₄ = 0 → 2π &nbsp;|&nbsp; Helligkeit = Tiefe (z)
</div>

<div class="ctrl"><label>Rotation</label><input type="range" min="0" max="20" value="6" id="sp" step="1"><span id="sp-o">6</span></div>
<div class="ctrl"><label>θ₄ Geschw.</label><input type="range" min="0" max="20" value="5" id="s4" step="1"><span id="s4-o">5</span></div>
<div class="ctrl"><label>Wicklung p</label><input type="range" min="1" max="7" value="3" id="pp" step="1"><span id="pp-o">3</span></div>
<div class="ctrl"><label>Wicklung q</label><input type="range" min="1" max="7" value="2" id="qq" step="1"><span id="qq-o">2</span></div>

<div class="info">
  <div class="badge">θ₁ θ₂ θ₃ → <b>Form</b></div>
  <div class="badge">θ₄ → <b>Farbe</b></div>
  <div class="badge">p:q = <b id="pq">3:2</b></div>
  <div class="badge">T̃·m = <b>1</b></div>
  <div class="badge">ξ = <b>4/30000</b></div>
</div>

<script>
var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=640,H=340,cx=W/2,cy=H/2,t=0,sp=6,s4=5,p=3,q=2;

function frame(){
  var rx=0.45+Math.sin(t*0.0025)*0.12, ry=t*sp*0.00035;
  ctx.clearRect(0,0,W,H);
  var R=108,r=40,N=600,pts=[];
  for(var i=0;i<=N;i++){
    var s=i/N;
    var t1=s*Math.PI*2*p, t2=s*Math.PI*2*q, t3=s*Math.PI*2+t*0.008, t4=s*Math.PI*2*(p+q)+t*s4*0.0008;
    var x=(R+r*Math.cos(t2+Math.sin(t3)*6))*Math.cos(t1+ry);
    var y=(R+r*Math.cos(t2+Math.sin(t3)*6))*Math.sin(t1+ry);
    var z=r*Math.sin(t2+Math.sin(t3)*6);
    var y1=y*Math.cos(rx)-z*Math.sin(rx), z1=y*Math.sin(rx)+z*Math.cos(rx);
    var sc=300/(300+z1);
    var br=Math.max(0.3,Math.min(1,(z1+150)/280));
    var hue=((t4/(Math.PI*2))*360)%360;
    pts.push({sx:cx+x*sc,sy:cy+y1*sc,hue:hue,br:br});
  }
  for(var i=1;i<pts.length;i++){
    var a=pts[i-1],b=pts[i];
    ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);
    ctx.strokeStyle='hsl('+b.hue.toFixed(0)+','+(70+b.br*20).toFixed(0)+'%,'+(30+b.br*35).toFixed(0)+'%)';
    ctx.lineWidth=1.8+b.br*0.8;ctx.globalAlpha=0.55+b.br*0.45;ctx.stroke();ctx.globalAlpha=1;
  }
  var pi=Math.floor((t*s4*0.0004%1)*N);
  if(pi<pts.length){
    var pt=pts[pi];
    ctx.beginPath();ctx.arc(pt.sx,pt.sy,5.5,0,Math.PI*2);
    ctx.fillStyle='hsl('+pt.hue.toFixed(0)+',90%,70%)';ctx.fill();
    ctx.beginPath();ctx.arc(pt.sx,pt.sy,10,0,Math.PI*2);
    ctx.strokeStyle='hsl('+pt.hue.toFixed(0)+',90%,70%)';ctx.lineWidth=1;ctx.globalAlpha=0.35;ctx.stroke();ctx.globalAlpha=1;
  }
  t++;requestAnimationFrame(frame);
}

function bind(id,oid,cb){
  var el=document.getElementById(id),out=document.getElementById(oid);
  el.addEventListener('input',function(){cb(+el.value);out.textContent=el.value;document.getElementById('pq').textContent=p+':'+q;});
}
bind('sp','sp-o',function(v){sp=v});
bind('s4','s4-o',function(v){s4=v});
bind('pp','pp-o',function(v){p=v});
bind('qq','qq-o',function(v){q=v});
frame();
</script>
</body>
</html>
